name: Merge Rules

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Merge rules
        run: |
          # AI 合集
          curl -s https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/OpenAI/OpenAI.list > ai.list
          curl -s https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Claude/Claude.list >> ai.list
          curl -s https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Gemini/Gemini.list >> ai.list
          echo "DOMAIN-SUFFIX,x.ai" >> ai.list
          echo "DOMAIN-SUFFIX,grok.com" >> ai.list

          # Facebook + Instagram 合集
          curl -s https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Facebook/Facebook.list > meta.list
          curl -s https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Instagram/Instagram.list >> meta.list

          # Twitter/X + WhatsApp 合集
          curl -s https://whatshub.top/rule/Twitter.list > wx.list
          curl -s https://whatshub.top/rule/Whatsapp.list >> wx.list

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add ai.list meta.list wx.list
          git commit -m "Update rules" || echo "No changes"
          git push
          
